name: MLSecOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  data-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate PDF dataset
        run: python src/data_validation.py --dataset-type pdf

      - name: Validate HTML dataset
        run: python src/data_validation.py --dataset-type html